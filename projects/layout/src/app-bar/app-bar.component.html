@if (withBackIcon()) {
    <button matIconButton matTooltip="{{ intl?.back ?? 'Back' }}" (click)="triggerGoBack()">
        <mat-icon>arrow_back</mat-icon>
    </button>
}

<header class="{{ mode() }}">
    <h1 class="title">{{ title() }}</h1>
    @if (subtitle()) {
        @if (mode() === 'condensed') {
            <mat-icon>chevron_right</mat-icon>
        }
        <h2 class="subtitle">{{ subtitle() }}</h2>
    }
</header>

<section class="actions">
    <ng-content />
    @if (helpUrl()) {
        <button matIconButton matTooltip="{{ intl?.help ?? 'Help' }}" (click)="openHelp()">
            <mat-icon>help</mat-icon>
        </button>
    }
</section>
