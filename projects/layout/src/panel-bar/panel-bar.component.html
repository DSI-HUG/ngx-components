@if (hasBackButton()) {
    <button
        mat-icon-button
        aria-label="Back button"
        matTooltip="{{ intl?.back ?? 'Back' }}"
        (click)="emitBackClicked()">
        <mat-icon>arrow_back</mat-icon>
    </button>
}

@if (hasTitle()) {
    <ng-content select="[ngxBarTitle]"></ng-content>
    <ng-container [ngTemplateOutlet]="ngContentLeft"></ng-container>
} @else {
    <ng-container [ngTemplateOutlet]="actionsGroup"></ng-container>
}


@if (hasRightContent()) {
    <div class="right">
        @if(hasTitle()) {
            <ng-container [ngTemplateOutlet]="actionsGroup"></ng-container>
        } @else {
            <ng-container [ngTemplateOutlet]="ngContentLeft"></ng-container>
        }
        <ng-content select="ngx-filters-group"></ng-content>
        <ng-content select="ngx-search-bar-container"></ng-content>
        <ng-content select="[ngxContentRight]"></ng-content>
        @if (closable()) {
            <button
                mat-icon-button
                class="close-button"
                aria-label="Close button"
                matTooltip="{{ intl?.close ?? 'Close' }}"
                (click)="emitCloseClicked()">
                <mat-icon>close</mat-icon>
            </button>
        }
    </div>
}

<ng-template #actionsGroup>
    <ng-content select="ngx-actions-group"></ng-content>
</ng-template>

<ng-template #ngContentLeft>
    <ng-content select="[ngxContentLeft]"></ng-content>
</ng-template>
